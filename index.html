<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CL16 | Helmet Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,900&family=Italianno&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        :root {
            --baby-blue: #BDE0FE;
            --electric-blue: #61fdfacf;
            --f-red: #EF1A2D;
            --font-display: "Playfair Display", "Bodoni 72", "Times New Roman", serif;
            --font-body: "Times New Roman", Times, serif;
            --font-italic: 'Italianno', cursive; 
            --stagger-offset: 90px; 
            --card-radius: 40px; 
        }

        body, html {
            margin: 0; padding: 0;
            background: radial-gradient(circle at center, #F8FDFF 0%, var(--baby-blue) 100%);
            background-attachment: fixed;
            font-family: var(--font-body);
            overflow-x: hidden;
            perspective: 2000px;
            -webkit-font-smoothing: antialiased;
        }

        /* 音乐控制 */
        #music-control {
            position: absolute; top: 40px; right: 40px;
            display: flex; align-items: center; gap: 10px;
            cursor: pointer; padding: 8px 15px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            border-radius: 2px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            transition: all 0.4s;
            z-index: 100;
        }
        #music-text { font-family: var(--font-body); font-size: 0.65rem; letter-spacing: 3px; text-transform: uppercase; }
        .music-icon { display: flex; align-items: flex-end; gap: 2px; height: 10px; }
        .music-icon .bar { width: 1.5px; background: var(--f-red); height: 100%; }
        .music-icon.playing .bar { animation: music-wave 0.8s infinite ease-in-out alternate; }
        @keyframes music-wave { from { height: 2px; } to { height: 10px; } }

        header { padding: 140px 20px 60px 20px; text-align: center; position: relative; }
        header h1 {
            font-family: var(--font-display);
            font-size: clamp(3.5rem, 12vw, 7.5rem);
            color: #fff; margin: 0; line-height: 0.8; letter-spacing: -4px;
        }
        header h1 span { color: var(--f-red); font-style: italic; }
        header p { font-size: 1rem; font-style: italic; letter-spacing: 12px; color: rgba(0, 100, 150, 0.4); text-transform: uppercase; margin-top: 25px; }

        /* 搜索框 */
        .search-container {
            max-width: 300px; margin: 0 auto 80px auto;
            position: relative; z-index: 10;
        }
        #searchInput {
            width: 100%; padding: 10px 0; background: transparent; border: none;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
            font-family: var(--font-body); font-size: 0.8rem; letter-spacing: 4px;
            text-transform: uppercase; text-align: center; outline: none; transition: all 0.4s;
        }
        #searchInput:focus { border-bottom: 1px solid var(--f-red); letter-spacing: 6px; }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 60px 50px;
            padding: 0 7vw 150px 7vw;
            max-width: 1800px;
            margin: 0 auto;
            align-items: start;
        }

        /* 响应式列数控制（删除了原有的 :nth-child 偏移） */
        @media (max-width: 1400px) and (min-width: 901px) {
            .grid-container { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 900px) {
            .grid-container { 
                grid-template-columns: repeat(2, 1fr); 
                /* 增加间距：上下 80px，左右 35px */
                gap: 80px 35px; 
                /* 稍微收紧两侧边距，给中间留空间 */
                padding: 0 5vw 150px 5vw; 
            }
            /* 手机端卡片圆角稍作调整 */
            :root { 
                --card-radius: 20px; 
                --stagger-offset: 80px; /* 定义手机端的偏移量 */
            }
        }

        .card-wrapper {
            position: relative;
            aspect-ratio: 3 / 4.2;
            will-change: transform, opacity;
            opacity: 0;
            transform: translateY(50px);
            transition: opacity 1s ease, transform 1s cubic-bezier(0.16, 1, 0.3, 1), margin-top 0.5s ease; /* 增加 margin 动画 */
        }
        .card-wrapper.visible { opacity: 1; transform: translateY(0); }
        .card-wrapper.search-hidden { display: none; }

        .card-inner {
            position: relative; width: 100%; height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
        }
        .card-inner.is-flipped { transform: rotateY(180deg) !important; }
        .face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: var(--card-radius);
            border: 10px solid white; background: white; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
        }
        .card-inner:hover .face { box-shadow: 0 0 0 1.5px var(--electric-blue), 0 20px 40px rgba(0,0,0,0.1); }
        .face img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .label {
            position: absolute; bottom: 0; left: 0; width: 100%;
            background: linear-gradient(to top, white 20%, transparent);
            padding: 30px 10px 15px 10px; text-align: center;
        }
        .label h2 { font-family: var(--font-display); font-size: 0.85rem; color: #00ccff; text-transform: uppercase; letter-spacing: 2px; margin: 0; }
        .back { transform: rotateY(180deg); }

        footer { padding: 100px 20px 150px 20px; text-align: center; }
        .footer-line { width: 60px; height: 1px; background: var(--f-red); margin: 0 auto 40px auto; opacity: 0.3; }
        .reveal-container { position: relative; display: inline-block; padding: 0 20px; overflow: hidden; }
        .reveal-text { font-family: var(--font-italic); font-size: 3.5rem; color: #333; margin: 0; opacity: 0; transform: translateY(10px); }
        .reveal-container::after { content: ""; position: absolute; top: 0; left: 0; width: 0; height: 100%; background: var(--electric-blue); z-index: 2; }
        .reveal-container.animate .reveal-text { animation: textAppear 0.1s forwards 0.8s; }
        .reveal-container.animate::after { animation: brushPass 1.6s cubic-bezier(0.65, 0, 0.35, 1) forwards; }
        @keyframes brushPass { 0% { width: 0; left: 0; } 50% { width: 100%; left: 0; } 100% { width: 0; left: 100%; } }
        @keyframes textAppear { to { opacity: 1; transform: translateY(0); } }
        .footer-text { font-family: var(--font-display); font-size: 1rem; letter-spacing: 8px; color: rgba(0,0,0,0.2); text-transform: uppercase; margin-top: 30px; }
    </style>
</head>

<body>
    <header>
        <audio id="bgm" loop preload="auto"><source src="bgm.mp3" type="audio/mpeg"></audio>
        <div id="music-control" onclick="toggleMusic()">
            <div class="music-icon"><span class="bar"></span><span class="bar"></span><span class="bar"></span></div>
            <span id="music-text">SOUND ON</span>
        </div>
        <p>Helmet Collection</p>
        <h1>LECLERC <span>16</span></h1>
    </header>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="SEARCH GP OR YEAR..." autocomplete="off">
    </div>

    <div class="grid-container" id="grid"></div>

    <footer>
        <div class="footer-line"></div>
        <div class="reveal-container" id="revealTrigger"><p class="reveal-text">Passion</p></div>
        <div class="footer-text">CL16 Archive</div>
    </footer>

    <script>
        const grid = document.getElementById('grid');
        const helmetList = [
            { title: "26 Miami", id: 62 }, { title: "26 Season", id: 61 }, { title: "25 Season", id: 3 },
            { title: "25 Hungary", id: 1 }, { title: "25 Monaco", id: 2 }, { title: "25 Singapore", id: 4 },
            { title: "25 China", id: 5 }, { title: "25 Miami", id: 6 }, { title: "25 Imola", id: 7 },
            { title: "25 Japan", id: 8 }, { title: "25 Monza", id: 9 }, { title: "25 Las Vegas", id: 10 },
            { title: "25 ABU DHABI", id: 51 }, { title: "24 Season", id: 11 }, { title: "24 JAPAN", id: 12 },
            { title: "24 MIAMI", id: 13 }, { title: "24 IMOLA", id: 14 }, { title: "24 MONACO", id: 15 },
            { title: "24 Monza", id: 16 }, { title: "24 Singapore", id: 17 }, { title: "24 MEXICO", id: 18 },
            { title: "24 LAS VAGAS", id: 19 }, { title: "24 ABU DHABI", id: 60 }, { title: "23 SEASON", id: 20 },
            { title: "23 MIAMI", id: 21 }, { title: "23 MONACO", id: 22 }, { title: "23 CANADA", id: 23 },
            { title: "23 MONZA", id: 24 }, { title: "23 AUSTIN", id: 25 }, { title: "23 LAS VAGAS", id: 26 },
            { title: "23 ABU DHABI", id: 27 }, { title: "22 SEASON", id: 28 }, { title: "22 MONACO", id: 29 },
            { title: "22 FRENCH", id: 30 }, { title: "22 Monza", id: 31 }, { title: "22 Singapore", id: 32 },
            { title: "22 BRAZIL", id: 33 }, { title: "22 ABU DHABI", id: 34 }, { title: "22 AUSTIN", id: 35 },
            { title: "21 TEST", id: 36 }, { title: "21 IMOLA", id: 37 }, { title: "21 Portu/SEASON", id: 38 },
            { title: "21 MONACO", id: 39 }, { title: "21 FRENCH", id: 40 }, { title: "21 AUSTIN", id: 41 },
            { title: "21 BRITiSH", id: 42 }, { title: "21 MONZA", id: 43 }, { title: "21 ABU DHABI", id: 44 },
            { title: "20 season", id: 45 }, { title: "20 austria", id: 46 }, { title: "20 Bahrain", id: 47 },
            { title: "20 IMOLA", id: 48 }, { title: "20 MONZA", id: 49 }, { title: "20 ABU DHABI", id: 50 },
            { title: "19 season", id: 52 }, { title: "19 CHINA", id: 53 }, { title: "19 Monaco", id: 54 },
            { title: "19 MONZA", id: 55 }, { title: "19 america", id: 56 }, { title: "19 ABU DHABI", id: 57 },
            { title: "18 season", id: 58 }, { title: "18 Monaco", id: 59 }
        ];

        // 渲染卡片
        helmetList.forEach((item) => {
            const wrapper = document.createElement('div');
            wrapper.className = 'card-wrapper';
            wrapper.dataset.speed = (0.01 + Math.random() * 0.015).toFixed(3);
            wrapper.dataset.title = item.title.toLowerCase(); 
            wrapper.innerHTML = `
                <div class="card-inner" onclick="this.classList.toggle('is-flipped')">
                    <div class="face front">
                        <img src="f${item.id}.jpg" onerror="if(!this.getAttribute('data-tried')){this.setAttribute('data-tried', '1'); this.src='F${item.id}.jpg';}" alt="Front">
                        <div class="label"><h2>${item.title}</h2></div>
                    </div>
                    <div class="face back">
                        <img src="b${item.id}.jpg" onerror="if(!this.getAttribute('data-tried')){this.setAttribute('data-tried', '1'); this.src='B${item.id}.jpg';}" alt="Back">
                    </div>
                </div>
            `;
            grid.appendChild(wrapper);
        });

        // 动态排版逻辑（替换原来的 CSS 错落）
        function updateLayout() {
            const visibleCards = Array.from(document.querySelectorAll('.card-wrapper:not(.search-hidden)'));
            const width = window.innerWidth;
            let cols = 4;
            if (width <= 900) cols = 2;
            else if (width <= 1400) cols = 3;

            visibleCards.forEach((card, index) => {
                card.style.marginTop = "0px";
                const colIndex = index % cols; // 0 是第1列，1 是第2列...
                
                if (cols === 4) {
                    if (colIndex === 1 || colIndex === 3) card.style.marginTop = "var(--stagger-offset)";
                } else if (cols === 3) {
                    if (colIndex === 1) card.style.marginTop = "var(--stagger-offset)";
                } else if (cols === 2) {
                    if (colIndex === 1) card.style.marginTop = "60px"; 
                }
            });
        }

        // 初始化排版
        window.addEventListener('resize', updateLayout);
        updateLayout();

        // 搜索逻辑
        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            document.querySelectorAll('.card-wrapper').forEach(card => {
                const isMatch = card.dataset.title.includes(term);
                card.classList.toggle('search-hidden', !isMatch);
            });
            updateLayout(); // 每次搜索重新排列
            handleMotion(); // 重新计算视差
        });

        // 视差与滚动观察
        const scrollObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    if(entry.target.id === 'revealTrigger') entry.target.classList.add('animate');
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.card-wrapper').forEach(w => scrollObserver.observe(w));
        scrollObserver.observe(document.getElementById('revealTrigger'));

        function handleMotion() {
            document.querySelectorAll('.card-wrapper.visible:not(.search-hidden)').forEach((card) => {
                const speed = parseFloat(card.dataset.speed);
                const rect = card.getBoundingClientRect();
                const offset = (window.innerHeight / 2) - (rect.top + rect.height / 2);
                card.style.transform = `translate3d(0, ${offset * speed}px, 0)`;
            });
            requestAnimationFrame(handleMotion);
        }
        window.addEventListener('scroll', handleMotion);

        // 鼠标倾斜
        document.querySelectorAll('.card-wrapper').forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const inner = card.querySelector('.card-inner');
                if(inner.classList.contains('is-flipped')) return;
                const rect = card.getBoundingClientRect();
                const xRot = ((e.clientY - rect.top) / rect.height - 0.5) * -10;
                const yRot = ((e.clientX - rect.left) / rect.width - 0.5) * 10;
                inner.style.transform = `rotateX(${xRot}deg) rotateY(${yRot}deg) scale(1.03)`;
            });
            card.addEventListener('mouseleave', () => {
                const inner = card.querySelector('.card-inner');
                if(!inner.classList.contains('is-flipped')) inner.style.transform = `rotateX(0deg) rotateY(0deg) scale(1)`;
            });
        });

        // 音乐
        const bgm = document.getElementById('bgm');
        const musicIcon = document.querySelector('.music-icon');
        const musicText = document.getElementById('music-text');
        function toggleMusic() {
            if (bgm.paused) {
                bgm.play().then(() => {
                    musicIcon.classList.add('playing');
                    musicText.innerText = "SOUND OFF";
                });
            } else {
                bgm.pause();
                musicIcon.classList.remove('playing');
                musicText.innerText = "SOUND ON";
            }
        }
    </script>
</body>
</html>
